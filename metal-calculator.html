<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metal Profiles Calculator — Tính khối lượng thép</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1116;
    --panel:#161a22;
    --panel-2:#1d2230;
    --line:#2a3142;
    --text:#e7ecf3;
    --muted:#8892a6;
    --accent:#ffb648;
    --accent-2:#ff7a45;
    --ok:#5ad19a;
    --danger:#ff6b6b;
    --shadow:0 12px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
  body{
    background:
      radial-gradient(1200px 600px at 90% -10%, rgba(255,182,72,.08), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,122,69,.07), transparent 60%),
      var(--bg);
  }
  .wrap{max-width:1280px;margin:0 auto;padding:28px 24px 80px}
  header{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:24px
  }
  .brand{display:flex;align-items:center;gap:14px}
  .logo{
    width:46px;height:46px;border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:800;color:#1a1300;font-size:22px;
    box-shadow:0 6px 20px rgba(255,122,69,.35)
  }
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:24px;margin:0;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .layout{display:grid;grid-template-columns:280px 1fr 380px;gap:20px}
  @media (max-width:1100px){.layout{grid-template-columns:1fr}}
  /* SIDEBAR */
  .side{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;
    max-height:calc(100vh - 140px);overflow:auto;position:sticky;top:20px
  }
  .side h3{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:6px 8px 10px}
  .nav-btn{
    width:100%;text-align:left;background:transparent;border:1px solid transparent;color:var(--text);
    padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;font-family:inherit;
    display:flex;align-items:center;gap:10px;transition:all .15s
  }
  .nav-btn:hover{background:var(--panel-2);border-color:var(--line)}
  .nav-btn.active{background:linear-gradient(135deg,rgba(255,182,72,.15),rgba(255,122,69,.1));border-color:var(--accent);color:#fff}
  .nav-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
  .nav-btn.active .dot{background:var(--accent)}
  /* MAIN */
  .main{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px}
  .calc-title{font-family:'Fraunces',serif;font-size:22px;font-weight:600;margin:0 0 4px}
  .calc-desc{color:var(--muted);font-size:13px;margin-bottom:20px}
  .calc-head{display:grid;grid-template-columns:1fr 200px;gap:24px;align-items:start;margin-bottom:22px}
  @media (max-width:720px){.calc-head{grid-template-columns:1fr}}
  .calc-head .calc-title,.calc-head .calc-desc{margin-bottom:0}
  .calc-desc{margin-bottom:0}
  .figure{
    background:#f4f1e8;
    border:1px solid var(--line);border-radius:12px;
    padding:14px;display:grid;place-items:center;min-height:180px;position:relative;overflow:hidden
  }
  .figure::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(60,60,80,.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(60,60,80,.06) 1px,transparent 1px);
    background-size:14px 14px;pointer-events:none
  }
  .figure::after{
    content:"";position:absolute;inset:6px;border:1px solid rgba(40,40,60,.18);border-radius:6px;pointer-events:none
  }
  .figure svg{position:relative;width:100%;height:auto;max-height:160px;max-width:200px}
  /* Nét vẽ chính (object line) — đậm, đen */
  .figure svg .obj{fill:none;stroke:#1a1a2e;stroke-width:1.6;stroke-linejoin:round;stroke-linecap:round}
  /* Phần thép đặc — fill bằng hatching pattern */
  .figure svg .steel{fill:url(#hatch);stroke:#1a1a2e;stroke-width:1.6;stroke-linejoin:round}
  /* Đường tâm (center line) — chấm gạch */
  .figure svg .center{stroke:#1a1a2e;stroke-width:.6;fill:none;stroke-dasharray:6 2 1 2}
  /* Đường gióng kích thước (extension line) — nét mảnh */
  .figure svg .ext{stroke:#1a1a2e;stroke-width:.5;fill:none}
  /* Đường ghi kích thước (dimension line) — có mũi tên */
  .figure svg .dim{stroke:#1a1a2e;stroke-width:.6;fill:none}
  .figure svg .hidden{stroke:#1a1a2e;stroke-width:.7;fill:none;stroke-dasharray:3 2}
  .figure svg text{fill:#1a1a2e;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600}
  .figure svg .title{font-size:8.5px;fill:#5a5a72;font-weight:500}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field.full{grid-column:1 / -1}
  label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.02em}
  label .unit{color:#54607a;font-family:'JetBrains Mono',monospace;font-size:11px;margin-left:4px}
  input,select{
    background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:11px 13px;color:var(--text);font-size:14px;font-family:'JetBrains Mono',monospace;
    outline:none;transition:border-color .15s
  }
  input:focus,select:focus{border-color:var(--accent)}
  select{font-family:'Inter',sans-serif}
  .hint{color:var(--muted);font-size:12px;margin-top:10px;font-style:italic}
  .result-box{
    margin-top:22px;padding:18px;border-radius:12px;
    background:linear-gradient(135deg,rgba(255,182,72,.08),rgba(255,122,69,.04));
    border:1px solid rgba(255,182,72,.25)
  }
  .result-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0}
  .result-row + .result-row{border-top:1px dashed var(--line)}
  .result-label{color:var(--muted);font-size:13px}
  .result-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent)}
  .result-val.big{font-size:22px}
  .paint-row{margin-top:6px}
  .paint-row .result-val{color:#5fb5ff !important}
  .paint-val small{color:#5fb5ff;opacity:.6 !important}
  .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .btn{
    padding:11px 18px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);
    color:var(--text);font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;transition:all .15s
  }
  .btn:hover{border-color:var(--accent)}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent;color:#1a1300}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(255,122,69,.3)}
  .btn-ghost{background:transparent}
  .note-input{
    background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:10px 13px;color:var(--text);font-size:13px;width:100%;outline:none;font-family:inherit;margin-top:12px
  }
  .note-input:focus{border-color:var(--accent)}
  .err{color:var(--danger);font-size:12.5px;margin-top:10px;display:none}
  .err.show{display:block}
  /* RIGHT — SAVED LIST */
  .saved{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;
    max-height:calc(100vh - 140px);overflow:auto;position:sticky;top:20px;display:flex;flex-direction:column
  }
  .saved-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .saved-head h3{margin:0;font-size:14px;font-family:'Fraunces',serif;font-weight:600}
  .saved-head .count{background:var(--panel-2);padding:3px 10px;border-radius:99px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 10px;border:1px dashed var(--line);border-radius:10px}
  .empty span{display:block;font-size:32px;margin-bottom:8px;opacity:.5}
  .saved-list{display:flex;flex-direction:column;gap:8px;flex:1}
  .item{
    background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;
    display:flex;flex-direction:column;gap:4px;transition:border-color .15s
  }
  .item:hover{border-color:var(--accent)}
  .item-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .item-name{font-size:12.5px;font-weight:600;color:var(--text)}
  .item-cat{font-size:10.5px;color:var(--muted);background:var(--bg);padding:2px 7px;border-radius:99px;text-transform:uppercase;letter-spacing:.05em}
  .item-spec{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--muted);line-height:1.5}
  .item-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
  .item-w{font-family:'JetBrains Mono',monospace;font-size:13.5px;font-weight:700;color:var(--accent)}
  .item-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:6px}
  .item-del:hover{color:var(--danger);background:rgba(255,107,107,.1)}
  .total{
    margin-top:12px;padding:14px 16px;border-radius:10px;
    background:linear-gradient(135deg,rgba(90,209,154,.1),rgba(90,209,154,.04));
    border:1px solid rgba(90,209,154,.3);
    display:flex;flex-direction:column;gap:8px
  }
  .total-row{display:flex;justify-content:space-between;align-items:center}
  .total-row + .total-row{padding-top:8px;border-top:1px dashed rgba(90,209,154,.2)}
  .total-paint .total-v{color:#5fb5ff}
  .total-paint{border-top-color:rgba(95,181,255,.25) !important}
  .total-l{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .total-v{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--ok)}
  .item-metrics{display:flex;flex-direction:column;gap:2px}
  .item-p{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;color:#5fb5ff}
  .saved-actions{display:flex;gap:8px;margin-top:10px}
  .saved-actions .btn{flex:1;justify-content:center;font-size:12px;padding:9px}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
    background:var(--ok);color:#0a2218;padding:12px 22px;border-radius:99px;font-weight:600;font-size:13.5px;
    box-shadow:var(--shadow);transition:transform .25s;z-index:1000
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  /* scrollbar */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">M</div>
      <div>
        <h1>Metal Profiles Calculator</h1>
        <div class="sub">Tính khối lượng cấu kiện thép · 16 loại profile · Lưu danh sách</div>
      </div>
    </div>
  </header>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="side">
      <h3>Loại cấu kiện</h3>
      <div id="nav"></div>
    </aside>

    <!-- MAIN CALC -->
    <main class="main">
      <div class="calc-head">
        <div>
          <h2 class="calc-title" id="calcTitle"></h2>
          <p class="calc-desc" id="calcDesc"></p>
        </div>
        <div class="figure" id="figure"></div>
      </div>
      <div class="field-grid" id="fields"></div>
      <div class="err" id="err"></div>
      <div class="result-box" id="resultBox">
        <div id="resultRows"></div>
      </div>
      <input class="note-input" id="noteInput" placeholder="Ghi chú cho cấu kiện này (tuỳ chọn) — vd: Dầm chính tầng 2">
      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">＋ Lưu cấu kiện</button>
        <button class="btn btn-ghost" id="resetBtn">↻ Đặt lại</button>
      </div>
    </main>

    <!-- SAVED -->
    <aside class="saved">
      <div class="saved-head">
        <h3>Cấu kiện đã lưu</h3>
        <span class="count" id="count">0</span>
      </div>
      <div id="savedList" class="saved-list"></div>
      <div class="total" id="totalBox" style="display:none">
        <div class="total-row">
          <span class="total-l">Tổng khối lượng</span>
          <span class="total-v" id="totalW">0 kg</span>
        </div>
        <div class="total-row total-paint">
          <span class="total-l">🎨 Tổng diện tích sơn</span>
          <span class="total-v" id="totalP">0 m²</span>
        </div>
      </div>
      <div class="saved-actions" id="savedActions" style="display:none">
        <button class="btn" id="exportBtn">⤓ Xuất CSV</button>
        <button class="btn" id="clearBtn">✕ Xoá tất cả</button>
      </div>
    </aside>
  </div>
</div>

<div class="toast" id="toast">Đã lưu</div>

<script>
/* ============================================================
   CẤU HÌNH CALCULATORS
   Tất cả công thức dựa trên mật độ thép ρ = 7.85 g/cm³ = 7850 kg/m³
   ============================================================ */
const DENSITY = 7850; // kg/m³

/* ============================================================
   THƯ VIỆN HÌNH MINH HOẠ SVG cho 16 loại profile
   ============================================================ */
const GRAD_DEFS = `
  <defs>
    <!-- Hatching pattern cho mặt cắt thép — đường chéo 45° -->
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a2e" stroke-width=".55"/>
    </pattern>
    <!-- Mũi tên kích thước nhỏ, kiểu kỹ thuật -->
    <marker id="arrEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#1a1a2e"/>
    </marker>
    <marker id="arrStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M10,1 L1,5 L10,9 z" fill="#1a1a2e"/>
    </marker>
  </defs>
`;

/* ================================================================
   16 BẢN VẼ MẶT CẮT 2D — kiểu drawing kỹ thuật:
   - Nền giấy kraft (CSS)
   - Đường vật thể đậm (.steel + hatching)
   - Đường gióng (.ext) + ghi kích thước (.dim) + mũi tên
   - Đường tâm (.center) cho profile tròn / đối xứng
   ================================================================ */
const FIGURES = {

  /* TẤM — mặt cắt cạnh (nhìn từ cạnh thấy độ dày t, rộng W) + view trên (W×L) */
  sheet: `<svg viewBox="0 0 240 180">${GRAD_DEFS}
    <text class="title" x="120" y="14" text-anchor="middle">MẶT CẮT — TẤM</text>
    <!-- View trên (plan): hình chữ nhật W × L -->
    <rect class="steel" x="40" y="30" width="140" height="60"/>
    <!-- gióng W -->
    <line class="ext" x1="40" y1="30" x2="40" y2="22"/>
    <line class="ext" x1="180" y1="30" x2="180" y2="22"/>
    <line class="dim" x1="40" y1="25" x2="180" y2="25" marker-start="url(#arrStart)" marker-end="url(#arrEnd)"/>
    <text x="110" y="22" text-anchor="middle">L</text>
    <!-- gióng L (chiều cao plan view) -->
    <line class="ext" x1="40" y1="90" x2="32" y2="90"/>
    <line class="ext" x1="40" y1="30" x2="32" y2="30"/>
    <line class="dim" x1="35" y1="30" x2="35" y2="90" marker-start="url(#arrStart)" marker-end="url(#arrEnd)"/>
    <text x="22" y="63" text-anchor="middle">W</text>
    <!-- Section A-A (side view): rất mỏng — chiều dày t -->
    <text class="title" x="120" y="115" text-anchor="middle">SECTION A–A</text>
    <rect class="steel" x="40" y="125" width="140" height="14"/>
    <line class="ext" x1="180" y1="125" x2="195" y2="125"/>
    <line class="ext" x1="180" y1="139" x2="195" y2="139"/>
    <line class="dim" x1="190" y1="125" x2="190" y2="139" marker-start="url(#arrStart)" marker-end="url(#arrEnd)"/>
    <text x="207" y="135">t</text>
  </svg>`,

  /* ỐNG ĐÚC TRÒN — mặt cắt vành khăn -->*/
  pipeSeamless: `<svg viewBox="0 0 200 180">${GRAD_DEFS}
    <text class="title" x="100" y="14" text-anchor="middle">MẶT CẮT — ỐNG ĐÚC</text>
    <!-- vành khăn dùng fill-rule evenodd -->
    <path class="steel" fill-rule="evenodd"
      d="M 100 35 a 55 55 0 1 0 .01 0 z
         M 100 50 a 40 40 0 1 1 -.01 0 z"/>
    <!-- center line ngang + dọc -->
    <line class="center" x1="30" y1="90" x2="170" y2="90"/>
    <line class="center" x1="100" y1="20" x2="100" y2="160"/>
    <!-- D: gióng từ trên xuống -->
    <line class="ext" x1="45" y1="90" x2="20" y2="90"/>
    <line class="ext" x1="155" y1="90" x2="180" y2="90"/>
    <line class="dim" x1="25" y1="90" x2="175" y2="90" marker-start="url(#arrStart)" marker-end="url(#arrEnd)"/>
    <rect x="92" y="83" width="16" height="13" fill="#f4f1e8"/>
    <text x="100" y="93" text-anchor="middle">D</text>
    <!-- t: chỉ vào thành ống ở phía dưới -->
    <line class="ext" x1="100" y1="135" x2="100" y2="155"/>
    <line class="ext" x1="100" y1="145" x2="125" y2="155"/>
    <line class="dim" x1="100" y1="148" x2="100" y2="135" marker-end="url(#arrEnd)"/>
    <text x="105" y="160">t</text>
  </svg>`,

  /* HSS TRÒN — y hệt ống đúc */
  hssCircular: `<svg viewBox="0 0 200 180">${GRAD_DEFS}
    <text class="title" x="100" y="14" text-anchor="middle">MẶT CẮT — HSS TRÒN</text>
    <path class="steel" fill-rule="evenodd"
      d="M 100 35 a 55 55 0 1 0 .01 0 z
         M 100 52 a 38 38 0 1 1 -.01 0 z"/>
    <line class="center" x1="30" y1="90" x2="170" y2="90"/>
    <line class="center" x1="100" y1="20" x2="100" y2="160"/>
    <line class="ext" x1="45" y1="90" x2="20" y2="90"/>
    <line class="ext" x1="155" y1="90" x2="180" y2="90"/>
    <line class="dim" x1="25" y1="90" x2="175" y2="90" marker-start="url(#arrStart)" marker-end="url(#arrEnd)"/>
    <rect x="92" y="83" width="16" height="13" fill="#f4f1e8"/>
    <text x="100" y="93" text-anchor="middle">D</text>
    <line class="ext" x1="100" y1="138" x2="125" y2="158"/>
    <text x="128" y="162">t</text>
  </svg>`,

  /* HSS VUÔNG — mặt cắt vuông rỗng */
  hssSquare: `<svg viewBox="0 0 200 180">${GRAD_DEFS}
    <text class="title" x="100" y="14" text-anchor="middle">MẶT CẮT — HSS VUÔNG</text>
    <!-- hình vuông rỗng (fill-rule evenodd) -->
    <path class="steel" fill-rule="evenodd"
      d="M 50 35 L 150 35 L 150 135 L 50 135 Z
         M 62 47 L 138 47 L 138 123 L 62 123 Z"/>
    <!-- center -->
    <line class="center" x1="20" y1="85" x2="180" y2="85"/>
    <line class="center" x1="100" y1="20" x2="100" y2="155"/>
    <!-- A trên -->
    <line class="ext" x1="50" y1="35" x2="50" y2="22"/>
    <line class="ext" x1="150" y1="35" x2="150" y2="22"/>
    <line class="dim" x1="50" y1="26" x2="150" y2="26" marker-start="url(#arrStart)" marker-end="url(#arrEnd)"/>
    <text x="100" y="23" text-anchor="middle">A</text>
    <!-- A bên trái -->
    <line class="ext" x1="50" y1="35" x2="37" y2="35"/>
    <line class="ext" x1="50" y1="135" x2="37" y2="135"/>

const CALCULATORS = {
  sheet: {
    name: 'Thép tấm / Steel sheets & plates',
    desc: 'Tấm phẳng. Khối lượng: m = t × W × L × ρ × n. Sơn cả 6 mặt ngoài.',
    fields: [
      {key:'t', label:'Độ dày, t', unit:'mm', def:''},
      {key:'w', label:'Chiều rộng, W', unit:'mm', def:''},
      {key:'l', label:'Chiều dài, L', unit:'m', def:''},
      {key:'n', label:'Số lượng', unit:'pcs', def:1}
    ],
    calc: ({t,w,l,n}) => {
      const tM = t/1000, wM = w/1000, lM = l; // L đã ở m
      const single = tM * wM * lM * DENSITY;
      // Diện tích sơn = toàn bộ 6 mặt ngoài
      const paintSingle = 2*(wM*lM) + 2*(tM*lM) + 2*(tM*wM);
      return [
        {label:'Khối lượng / 1 tấm', val:single, unit:'kg'},
        {label:'Tổng khối lượng', val:single*n, unit:'kg', big:true},
        {label:'Diện tích sơn / 1 tấm', val:paintSingle, unit:'m²', paint:true},
        {label:'Tổng diện tích sơn', val:paintSingle*n, unit:'m²', paint:true, big:true}
      ];
    }
  },
  pipeSeamless: {
    name:'Ống thép đúc tròn / Seamless pipe',
    desc:'Ống tròn rỗng. Sơn mặt trụ ngoài: πD·L. Chú ý: t ≤ ½D.',
    fields:[
      {key:'d', label:'Đường kính ngoài, D', unit:'mm'},
      {key:'t', label:'Độ dày, t', unit:'mm'},
      {key:'l', label:'Chiều dài, L', unit:'m'},
      {key:'n', label:'Số lượng', unit:'pcs', def:1}
    ],
    validate: ({d,t}) => t > d/2 ? 'Độ dày không được lớn hơn ½ đường kính' : null,
    calc: ({d,t,l,n}) => {
      const area = Math.PI * t * (d - t) / 1e6; // m²
      const perM = area * DENSITY;
      const paintPerM = Math.PI * d / 1000; // m²/m, chỉ mặt trụ ngoài (cấu kiện rỗng)
      return [
        {label:'Khối lượng / mét', val:perM, unit:'kg/m'},
        {label:'Khối lượng / cây', val:perM*l, unit:'kg'},
        {label:'Tổng khối lượng', val:perM*l*n, unit:'kg', big:true},
        {label:'Diện tích sơn / mét', val:paintPerM, unit:'m²/m', paint:true},
        {label:'Tổng diện tích sơn', val:paintPerM*l*n, unit:'m²', paint:true, big:true}
      ];
    }
  },
  hssCircular: {
    name:'Ống tròn hộp / HSS — circular',
    desc:'Hollow structural section tròn. Sơn mặt ngoài: πD·L.',
    fields:[
      {key:'d', label:'Đường kính ngoài, D', unit:'mm'},
      {key:'t', label:'Độ dày, t', unit:'mm'},
      {key:'l', label:'Chiều dài, L', unit:'m'},
      {key:'n', label:'Số lượng', unit:'pcs', def:1}
    ],
    validate: ({d,t}) => t > d/2 ? 'Độ dày không được lớn hơn ½ đường kính' : null,
    calc: ({d,t,l,n}) => {
      const area = Math.PI * t * (d - t) / 1e6;
      const perM = area * DENSITY;
      const paintPerM = Math.PI * d / 1000;
      return [
        {label:'Khối lượng / mét', val:perM, unit:'kg/m'},
        {label:'Khối lượng / cây', val:perM*l, unit:'kg'},
        {label:'Tổng khối lượng', val:perM*l*n, unit:'kg', big:true},
        {label:'Diện tích sơn / mét', val:paintPerM, unit:'m²/m', paint:true},
        {label:'Tổng diện tích sơn', val:paintPerM*l*n, unit:'m²', paint:true, big:true}
      ];

  },
  hssSquare: {
    name:'Hộp vuông / HSS — square',
    desc:'Profile rỗng vuông. Sơn 4 mặt ngoài: 4A·L.',
    fields:[
      {key:'a', label:'Cạnh, A', unit:'mm'},
      {key:'t', label:'Độ dày, t', unit:'mm'},

    ],
    validate: ({a,t}) => t >= a/2 ? 'Độ dày phải nhỏ hơn ½ cạnh' : null,
    calc: ({a,t,l,n}) => {
      const area = (a*a - (a-2*t)*(a-2*t)) / 1e6;

      return [
        {label:'Khối lượng / mét', val:perM, unit:'kg/m'},

const NAV_ORDER = [
  'sheet','pipeSeamless','hssCircular','hssSquare','hssRect',
  'roundBar','squareBar','flatBar','equalAngle','unequalAngle',
  'channelGOST','channelUPN','beamIPN','beamIPE','beamHEA','beamHEB'
];

/* ============================================================
   STATE & STORAGE
   ============================================================ */
const STORAGE_KEY = 'metalCalc.saved.v1';
let state = {
  current: 'sheet',
  saved: JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
};

function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.saved)); }

/* ============================================================
   RENDER NAV
   ============================================================ */
const navEl = document.getElementById('nav');
NAV_ORDER.forEach(key => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (key === state.current ? ' active' : '');
  btn.dataset.key = key;
  btn.innerHTML = `<span class="dot"></span><span>${CALCULATORS[key].name}</span>`;
  btn.onclick = () => selectCalc(key);
  navEl.appendChild(btn);
});

function selectCalc(key){
  state.current = key;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  renderCalc();
}

/* ============================================================
   RENDER CALC FORM
   ============================================================ */
function renderCalc(){
  const calc = CALCULATORS[state.current];
  document.getElementById('calcTitle').textContent = calc.name;
  document.getElementById('calcDesc').textContent = calc.desc;
  document.getElementById('figure').innerHTML = FIGURES[state.current] || '';
  const fields = document.getElementById('fields');
  fields.innerHTML = '';
  calc.fields.forEach(f => {
    const div = document.createElement('div');
    div.className = 'field';
    let inputHtml = '';
    if(f.type === 'select'){
      inputHtml = `<select id="f_${f.key}">
        <option value="">— Chọn —</option>
        ${f.options.map(o => `<option value="${o[1]}">${o[0]} (${o[1]} kg/m)</option>`).join('')}
      </select>`;
    } else {
      inputHtml = `<input type="number" id="f_${f.key}" step="any" min="0" value="${f.def !== undefined ? f.def : ''}" placeholder="0">`;
    }
    div.innerHTML = `<label>${f.label}${f.unit ? `<span class="unit">${f.unit}</span>` : ''}</label>${inputHtml}`;
    fields.appendChild(div);
  });
  // gắn sự kiện input
  calc.fields.forEach(f => {
    const el = document.getElementById('f_' + f.key);
    el.addEventListener('input', updateResult);
    el.addEventListener('change', updateResult);
  });
  document.getElementById('noteInput').value = '';
  updateResult();
}

function getInputs(){
  const calc = CALCULATORS[state.current];
  const data = {};
  for(const f of calc.fields){
    const el = document.getElementById('f_' + f.key);
    if(f.type === 'select'){
      data[f.key] = el.value;
    } else {
      data[f.key] = parseFloat(el.value);
    }
  }
  return data;
}

function inputsValid(data){
  const calc = CALCULATORS[state.current];
  for(const f of calc.fields){
    const v = data[f.key];
    if(f.type === 'select'){
      if(!v) return false;
    } else {
      if(isNaN(v) || v <= 0) return false;
    }
  }
  return true;
}

function updateResult(){
  const calc = CALCULATORS[state.current];
  const data = getInputs();
  const errEl = document.getElementById('err');
  const box = document.getElementById('resultRows');
  errEl.classList.remove('show');

  if(!inputsValid(data)){
    box.innerHTML = `<div class="result-row"><span class="result-label">Nhập đầy đủ các thông số để xem kết quả</span></div>`;
    return;
  }

  if(calc.validate){
    const err = calc.validate(data);
    if(err){
      errEl.textContent = '⚠ ' + err;
      errEl.classList.add('show');
      box.innerHTML = `<div class="result-row"><span class="result-label">—</span></div>`;
      return;
    }
  }

  const results = calc.calc(data);
  box.innerHTML = results.map(r =>
    `<div class="result-row ${r.paint?'paint-row':''}">
       <span class="result-label">${r.paint?'🎨 ':''}${r.label}</span>
       <span class="result-val ${r.big?'big':''} ${r.paint?'paint-val':''}">${formatNum(r.val)} <small style="opacity:.7">${r.unit}</small></span>
     </div>`
  ).join('');
}

function formatNum(n){
  if(!isFinite(n)) return '—';
  if(n >= 100) return n.toFixed(2);
  if(n >= 1) return n.toFixed(3);
  return n.toFixed(4);
}

/* ============================================================
   SAVE / LIST CẤU KIỆN
   ============================================================ */
document.getElementById('saveBtn').onclick = () => {
  const calc = CALCULATORS[state.current];
  const data = getInputs();
  if(!inputsValid(data)){
    flash('Nhập đầy đủ trước khi lưu', true);
    return;
  }
  if(calc.validate){
    const err = calc.validate(data);
    if(err){ flash(err, true); return; }
  }
  const results = calc.calc(data);
  // tách weight và paint từ results
  const weightResults = results.filter(r => !r.paint);
  const paintResults = results.filter(r => r.paint);
  const totalWeight = weightResults.length ? weightResults[weightResults.length-1].val : 0;
  const totalPaint = paintResults.length ? paintResults[paintResults.length-1].val : 0;
  const note = document.getElementById('noteInput').value.trim();
  // tạo chuỗi spec
  const specParts = calc.fields.map(f => {
    const v = data[f.key];
    if(f.type === 'select'){
      const opt = f.options.find(o => String(o[1]) === String(v));
      return opt ? opt[0] : v;
    }
    return `${f.label.split(',')[0].trim()}=${v}${f.unit ? f.unit : ''}`;
  });
  const item = {
    id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
    catKey: state.current,
    catName: calc.name,
    note: note || calc.name.split('/')[0].trim(),
    spec: specParts.join(' · '),
    weight: totalWeight,
    paint: totalPaint,
    data
  };
  state.saved.unshift(item);
  persist();
  renderSaved();
  flash('Đã lưu cấu kiện');
};

document.getElementById('resetBtn').onclick = () => renderCalc();

document.getElementById('clearBtn').onclick = () => {
  if(confirm('Xoá tất cả ' + state.saved.length + ' cấu kiện đã lưu?')){
    state.saved = [];
    persist();
    renderSaved();
  }
};

document.getElementById('exportBtn').onclick = exportCSV;

function renderSaved(){
  const list = document.getElementById('savedList');
  const count = document.getElementById('count');
  const totalBox = document.getElementById('totalBox');
  const actions = document.getElementById('savedActions');
  count.textContent = state.saved.length;
  if(state.saved.length === 0){
    list.innerHTML = `<div class="empty"><span>📋</span>Chưa có cấu kiện nào.<br>Tính xong rồi nhấn “Lưu cấu kiện”.</div>`;
    totalBox.style.display = 'none';
    actions.style.display = 'none';
    return;
  }
  list.innerHTML = state.saved.map(it => `
    <div class="item">
      <div class="item-head">
        <span class="item-name">${escapeHtml(it.note)}</span>
        <span class="item-cat">${shortCat(it.catKey)}</span>
      </div>
      <div class="item-spec">${escapeHtml(it.spec)}</div>
      <div class="item-foot">
        <div class="item-metrics">
          <span class="item-w">${formatNum(it.weight)} kg</span>
          ${it.paint ? `<span class="item-p">🎨 ${formatNum(it.paint)} m²</span>` : ''}
        </div>
        <button class="item-del" data-id="${it.id}" title="Xoá">✕</button>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.item-del').forEach(b => {
    b.onclick = () => {
      state.saved = state.saved.filter(x => x.id !== b.dataset.id);
      persist();
      renderSaved();
    };
  });
  const totalW = state.saved.reduce((s,it) => s + (it.weight||0), 0);
  const totalP = state.saved.reduce((s,it) => s + (it.paint||0), 0);
  document.getElementById('totalW').textContent = formatNum(totalW) + ' kg';
  document.getElementById('totalP').textContent = formatNum(totalP) + ' m²';
  totalBox.style.display = 'flex';
  actions.style.display = 'flex';
}

function shortCat(key){
  const map = {
    sheet:'Tấm', pipeSeamless:'Ống đúc', hssCircular:'Ống tròn', hssSquare:'Hộp vuông',
    hssRect:'Hộp CN', roundBar:'Tròn đặc', squareBar:'Vuông đặc', flatBar:'Dẹt',
    equalAngle:'L đều', unequalAngle:'L lệch', channelGOST:'U GOST', channelUPN:'UPN',
    beamIPN:'IPN', beamIPE:'IPE', beamHEA:'HEA', beamHEB:'HEB'
  };
  return map[key] || key;
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function exportCSV(){
  const rows = [['Tên/Ghi chú','Loại','Thông số','Khối lượng (kg)','Diện tích sơn (m²)']];
  state.saved.forEach(it => rows.push([
    it.note, it.catName, it.spec,
    (it.weight||0).toFixed(4),
    (it.paint||0).toFixed(4)
  ]));
  const totalW = state.saved.reduce((s,it) => s + (it.weight||0), 0);
  const totalP = state.saved.reduce((s,it) => s + (it.paint||0), 0);
  rows.push(['','','TỔNG', totalW.toFixed(4), totalP.toFixed(4)]);
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cau-kien-thep-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer;
function flash(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? 'var(--danger)' : 'var(--ok)';
  t.style.color = isErr ? '#fff' : '#0a2218';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ============================================================
   INIT
   ============================================================ */
renderCalc();
renderSaved();
</script>
</body>
</html>
